[profile.ci.fuzz]
runs=10000
[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
[etherscan]
sepolia = {key = "${ETHERSCAN_API_KEY}"}
base_sepolia = {key = "${ETHERSCAN_API_KEY}", url="https://api-sepolia.basescan.org/api"}